# Source configuration for the podcast intelligence agent.
#
# Three buckets:
#   - channels:    YouTube channels we poll for new uploads (subscribed feed)
#   - podcasts:    RSS feeds we poll for new audio episodes (see src/lib/rss.js)
#   - individuals: People AND companies we want to discover appearances of
#                  via daily YouTube search (LLM-curated, see src/stages/1b-discover.js)
#
# channel_id is the canonical YouTube ID (starts with "UC..."). If left blank,
# the `npm run resolve-channels` helper will look it up from the handle and
# write it back into this file. handles must start with "@".
#
# Edit via `npm run web` (single-page UI) or by hand.
# To add a new source: just append to the list. The pipeline picks it up on
# next run. To temporarily mute one, set `enabled: false`.

channels:
  - name: All-In
    handle: "@AllInPodcast"
    channel_id: "UChJM-mF-4w_61Z6eCyl0eKQ"
  - name: BG2
    handle: "@bg2pod"
    channel_id: "UC-yRDvpR99LUc5l7i7jLzew"
  - name: Sharp Tech (Stratechery)
    handle: "@SharpTech"
    channel_id: ""
    enabled: false # TODO: channel has no /videos tab on YouTube (audio-only via playlists)
  - name: Acquired
    handle: "@AcquiredFM"
    channel_id: "UCyFqFYfTW2VoIQKylJ04Rtw"
  - name: Dwarkesh Patel
    handle: "@DwarkeshPatel"
    channel_id: "UCXl4i9dYBrFOabk0xGmbkRA"
  - name: No Priors
    handle: "@NoPriorsPodcast"
    channel_id: "UCSI7h9hydQ40K5MJHnCrQvw"
  - name: Invest Like the Best
    handle: "@JoinColossus"
    channel_id: "UCfnHKTFEryHWyqr4Xjsjb3w"
  - name: Lenny's Podcast
    handle: "@LennysPodcast"
    channel_id: "UC6t1O76G0jYXOAoYCm153dA"
  - name: Latent Space
    handle: "@LatentSpaceTV"
    channel_id: "UCvi5jNRoRVm436TVAXet1kQ"
  - name: a16z
    handle: "@a16z"
    channel_id: "UC9cn0TuPq4dnbTY-CBsm8XA"
  - name: Sequoia Capital
    handle: "@sequoiacapital"
    channel_id: "UCWrF0oN6unbXrWsTN7RctTw"
  - name: Patrick Boyle
    handle: "@PBoyle"
    channel_id: "UCASM0cgfkJxQ1ICmRilfHLw"

# Podcast RSS feeds. Polled daily for new audio episodes; transcribed via
# the WhisperX-Modal worker. Each item just needs `name` + `url`; set
# `enabled: false` to mute without removing.
podcasts:
  - name: Dwarkesh Patel
    url: https://apple.dwarkesh-podcast.workers.dev/feed.rss
  - name: Cheeky Pint with John Collison
    url: https://feeds.transistor.fm/cheeky-pint-with-john-collison
  - name: Another Podcast
    url: https://feeds.simplecast.com/bZ7U2PEk
  - name: The a16z Show
    url: https://feeds.simplecast.com/JGE3yC0V
  - name: Moonshots
    url: https://feeds.megaphone.fm/DVVTS2890392624

# Discovery: search YouTube broadly for the named individuals below and
# auto-curate via Claude before promoting into the daily pipeline.
# See src/stages/1b-discover.js. Set enabled: false to skip.
discovery:
  enabled: true
  lookback_days: 7
  min_duration_sec: 1200 # 20 minutes — drops clips, reactions, news cuts
  results_per_name: 20 # YouTube search results per name per run

# Watched individuals & companies. Discovery searches YouTube for each name
# daily and routes auto-approved interview/podcast/talk appearances into the
# brief. Names can be people OR companies — the pipeline doesn't distinguish.
individuals:
  - Jensen Huang
  - Elon Musk
  - Dario Amodei
  - Sam Altman
  - Sundar Pichai
  - Demis Hassabis
  - Mark Zuckerberg
  - Satya Nadella
  - Aravind Srinivas
  - Aidan Gomez
  - Matthew Prince
  - Marc Benioff
  - Andrej Karpathy
