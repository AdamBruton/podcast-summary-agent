# Source configuration for the podcast intelligence agent.
#
# Three buckets:
#   - channels:    YouTube channels we poll for new uploads
#   - individuals: People we want appearances of (cross-channel search)
#   - companies:   Company-owned channels (talks, keynotes, dev relations)
#
# channel_id is the canonical YouTube ID (starts with "UC..."). If left blank,
# the `npm run resolve-channels` helper will look it up from the handle and
# write it back into this file. handles must start with "@".
#
# To add a new source: just append to the list. The pipeline picks it up on
# next run. To temporarily mute one, set `enabled: false`.

channels:
  - name: All-In
    handle: "@AllInPodcast"
    channel_id: ""
  - name: BG2
    handle: "@bg2pod"
    channel_id: ""
  - name: Sharp Tech (Stratechery)
    handle: "@SharpTech"
    channel_id: ""
  - name: Acquired
    handle: "@AcquiredFM"
    channel_id: ""
  - name: Dwarkesh Patel
    handle: "@DwarkeshPatel"
    channel_id: ""
  - name: No Priors
    handle: "@NoPriorsPodcast"
    channel_id: ""
  - name: Invest Like the Best
    handle: "@JoinColossus"
    channel_id: ""
  - name: Lenny's Podcast
